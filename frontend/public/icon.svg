  <path d="M17 20 L28 30" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <path d="M17 32 L28 32" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <path d="M17 44 L28 34" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>

  <!-- Central convert arrow -->
