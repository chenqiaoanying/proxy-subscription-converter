<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F7CFF"/>
      <stop offset="1" stop-color="#7B3FF2"/>
    </linearGradient>
    <linearGradient id="arrow" x1="12" y1="32" x2="52" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#E0F0FF" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Left source nodes -->
  <circle cx="14" cy="20" r="3.2" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="14" cy="32" r="3.2" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="14" cy="44" r="3.2" fill="#FFFFFF" opacity="0.9"/>

